<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#071421" />
    <meta name="description" content="Pablo Moreno Lasa, Investment Banking Analyst at Evercore. Utilities, Infrastructure &amp; Transport M&amp;A." />

    <title>Pablo Moreno Lasa | Evercore</title>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pablo Moreno Lasa | Evercore" />
    <meta property="og:description" content="Investment Banking Analyst. Utilities, Infrastructure &amp; Transport M&amp;A." />
    <meta property="og:site_name" content="Pablo Moreno Lasa" />
    <!-- Replace with the final GitHub Pages URL after publishing for richer WhatsApp and LinkedIn previews. -->
    <meta property="og:image" content="assets/evercore-seeklogo-2.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/svg+xml" href="assets/evercore-seeklogo-2.svg" />
    <link rel="preload" href="assets/evercore-seeklogo-2.svg" as="image" />
    <link rel="stylesheet" href="styles/imp_style.css" />
  </head>
  <body>
    <main class="page-shell" aria-label="Digital business card">
      <div class="ambient ambient-one" aria-hidden="true"></div>
      <div class="ambient ambient-two" aria-hidden="true"></div>
      <section class="business-card" id="businessCard" aria-labelledby="personName">
        <div class="card-pattern" aria-hidden="true"></div>

        <header class="card-header">
          <img class="brand-logo" src="assets/evercore-seeklogo-2.svg" alt="Evercore" />
          <div class="metal-line" aria-hidden="true"></div>
        </header>

        <div class="identity">
          <p class="eyebrow" id="locationText">London, United Kingdom</p>
          <h1 id="personName">Pablo Moreno Lasa</h1>
          <p class="role" id="roleText">Investment Banking Analyst</p>
          <p class="tagline" id="taglineText">Utilities, Infrastructure &amp; Transport M&amp;A</p>
        </div>

        <nav class="actions" aria-label="Contact actions">
          <a class="action action-primary" id="saveContact" href="assets/pablo-moreno.vcf" download aria-label="Save Pablo Moreno Lasa contact">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 3v10m0 0 4-4m-4 4-4-4M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2" /></svg>
            </span>
            <span>Guardar contacto</span>
          </a>

          <div class="quick-actions">
            <a class="action" id="linkedinLink" href="https://www.linkedin.com/in/pablo-moreno-lasa-924890254/" target="_blank" rel="noopener noreferrer" aria-label="Open Pablo Moreno Lasa LinkedIn profile">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z" /><path d="M2 9h4v12H2z" /><path d="M4 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" /></svg>
              </span>
              <span>LinkedIn</span>
            </a>
            <a class="action" id="companyLink" href="https://www.linkedin.com/company/163732/" target="_blank" rel="noopener noreferrer" aria-label="Open Evercore LinkedIn page">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M3 21h18" /><path d="M5 21V7l7-4 7 4v14" /><path d="M9 21v-7h6v7" /><path d="M9 9h.01" /><path d="M15 9h.01" /></svg>
              </span>
              <span>Evercore</span>
            </a>
          </div>
        </nav>

        <button class="share-button" id="shareButton" type="button" aria-label="Share this digital card" hidden>
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" /><path d="m8.6 13.5 6.8 4" /><path d="m15.4 6.5-6.8 4" /></svg>
          </span>
          <span>Compartir tarjeta</span>
        </button>

        <p class="tap-note">Tap to connect</p>
      </section>
    </main>

    <script src="scripts/card.js" defer></script>
  </body>
</html>
